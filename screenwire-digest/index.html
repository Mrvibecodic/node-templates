<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenWire — дайджест ссылок: игры, фильмы, сериалы</title>
  <meta name="description" content="ScreenWire — лента релизов и новинок: игры, фильмы и сериалы в одной ленте. Свежие скидки, премьеры и эпизоды дня.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css?v=1780620000">
</head>
<body>

  <header class="topbar">
    <div class="wrap topbar-in">
      <a class="brand" href="./">
        <span class="brand-mark">SW</span>
        <span class="brand-name">ScreenWire</span>
      </a>
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-feed="all">Всё</button>
        <button class="tab" data-feed="games">Игры</button>
        <button class="tab" data-feed="movies">Фильмы</button>
        <button class="tab" data-feed="series">Сериалы</button>
      </nav>
      <div class="topbar-right">
        <button class="ghost-btn" id="refresh" title="Обновить">Обновить</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="feed-head">
      <h1 id="feed-title">Свежее</h1>
      <span class="feed-sub" id="feed-sub">Свежее за сегодня</span>
    </div>

    <ol class="feed" id="feed" start="1">
      <li class="row row-skeleton"><span class="sk"></span></li>
      <li class="row row-skeleton"><span class="sk"></span></li>
      <li class="row row-skeleton"><span class="sk"></span></li>
      <li class="row row-skeleton"><span class="sk"></span></li>
      <li class="row row-skeleton"><span class="sk"></span></li>
    </ol>

    <div class="feed-foot">
      <button class="more-btn" id="more">Показать ещё</button>
    </div>
  </main>

  <footer class="site-foot">
    <div class="wrap foot-in">
      <p class="foot-cols">
        <a href="#" data-feed="games">Игры</a>
        <a href="#" data-feed="movies">Фильмы</a>
        <a href="#" data-feed="series">Сериалы</a>
        <span class="dot">·</span>
        <a href="#" data-feed="all">Свежее</a>
      </p>
      <p class="foot-note">ScreenWire — лента релизов и новинок: игры, фильмы и сериалы в одном месте. © 2026</p>
    </div>
  </footer>

  <script src="assets/js/app.js?v=1780620000"></script>
</body>
</html>
