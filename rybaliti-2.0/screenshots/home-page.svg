<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Рыбалити 2.0 — главная страница">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a1c2c"/><stop offset="1" stop-color="#06121d"/></linearGradient>
    <linearGradient id="wl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafdff"/><stop offset=".5" stop-color="#7fdcff"/><stop offset="1" stop-color="#2b8fd4"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe9a0"/><stop offset="1" stop-color="#f4a51f"/></linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3fae5a"/><stop offset="1" stop-color="#5fe06b"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%"><stop offset="0" stop-color="#1f4a6e" stop-opacity=".55"/><stop offset="1" stop-color="#1f4a6e" stop-opacity="0"/></radialGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#glow)"/>
  <g stroke="#2b6f95" stroke-width="3" fill="none" opacity=".18">
    <path d="M0 612 q40 -16 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0"/>
    <path d="M0 652 q40 -16 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0"/>
    <path d="M0 692 q40 -16 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0"/>
  </g>

  <g transform="translate(640,150)">
    <ellipse cx="0" cy="0" rx="34" ry="17" fill="#ff8a2a" stroke="#08202e" stroke-width="2.5"/>
    <path d="M-32 0 l-22 -16 l7 16 l-7 16 z" fill="#ff8a2a" stroke="#08202e" stroke-width="2.5"/>
    <circle cx="16" cy="-5" r="4.5" fill="#08202e"/>
    <path d="M22 -10 q14 -2 18 8" fill="none" stroke="#ffe27a" stroke-width="3" stroke-linecap="round"/>
    <g stroke="#cfe6ff" stroke-width="2" opacity=".5"><line x1="-2" y1="20" x2="-2" y2="34"/><line x1="10" y1="20" x2="10" y2="38"/></g>
  </g>

  <g transform="translate(412,196)">
    <path d="M14 96 q22 -11 44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0 t44 0" fill="none" stroke="#2b6f95" stroke-width="4" opacity=".5"/>
    <g transform="translate(300,22) rotate(-18)"><ellipse cx="0" cy="0" rx="17" ry="8.5" fill="#ffd24a" stroke="#08202e" stroke-width="2"/><path d="M-16 0 l-12 -8 l4 8 l-4 8 z" fill="#ffd24a" stroke="#08202e" stroke-width="2"/><circle cx="8" cy="-3" r="2.6" fill="#08202e"/></g>
    <text x="14" y="76" font-family="'Arial Black',Arial,sans-serif" font-size="56" font-weight="900" letter-spacing="1" paint-order="stroke" stroke="#08202e" stroke-width="4" fill="url(#wl)">РЫБАЛИТИ</text>
    <rect x="350" y="46" width="100" height="50" rx="13" fill="url(#gold)" stroke="#b87a10" stroke-width="2.5"/>
    <text x="400" y="84" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="33" font-weight="900" fill="#3a2406">2.0</text>
  </g>

  <text x="640" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="7" fill="#7fb8d8">НЕРЕАЛЬНОЕ ЗАРЫБЛЕНИЕ</text>

  <rect x="490" y="398" width="300" height="62" rx="31" fill="url(#grn)"/>
  <text x="640" y="438" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="1" fill="#06210f">НАЧАТЬ РЫБАЛКУ</text>

  <g font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#9fc4dc" text-anchor="middle">
    <text x="640" y="522">Зажми ЛКМ и целься мышкой — отпусти, чтобы забросить.</text>
    <text x="640" y="550">Поплавок ушёл под воду — кликни, чтобы подсечь.</text>
    <text x="640" y="578">Вываживай: держи мышь, но следи за натяжением лески.</text>
    <text x="640" y="606">День сменяет ночь каждые 10 минут — ночью клюёт крупняк.</text>
    <text x="640" y="634">Особые морские чудища, атлас рыб, прокачка снастей.</text>
  </g>
</svg>
